        - "14. Backtesting": strategies/SMC-ICT/04-MASTER/14-backtesting.md
        - "15. Trading Journal": strategies/SMC-ICT/04-MASTER/15-trading-journal.md
    - SnR:
      - Overview: strategies/SnR/README.md
      - "🟢 LOW — Fondasi":
        - "01. Apa itu SnR": strategies/SnR/01-LOW/01-apa-itu-snr.md
        - "02. Cara Menggambar Level": strategies/SnR/01-LOW/02-cara-menggambar-level.md
        - "03. Jenis-jenis SnR": strategies/SnR/01-LOW/03-jenis-jenis-snr.md
      - "🟡 MEDIUM — Teknik":
        - "04. Static vs Dynamic": strategies/SnR/02-MEDIUM/04-static-vs-dynamic.md
        - "05. Zone vs Line": strategies/SnR/02-MEDIUM/05-zone-vs-line.md
        - "06. Role Reversal": strategies/SnR/02-MEDIUM/06-role-reversal.md
    - Fundamental:
