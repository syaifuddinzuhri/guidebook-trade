      - "🟢 LOW — Dasar":
        - "01. Apa itu Fundamental": strategies/Fundamental/01-LOW/01-apa-itu-fundamental.md
        - "02. Data Ekonomi Penting": strategies/Fundamental/01-LOW/02-data-ekonomi-penting.md
